<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PyroShow Pro — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
body{background:#05060e;color:#eef0f8;display:flex;align-items:center;justify-content:center}

/* Fondo */
.bg{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px)}
.o1{width:500px;height:500px;background:radial-gradient(circle,rgba(232,160,32,.3),transparent 70%);top:-150px;left:-150px;animation:fl 9s ease-in-out infinite}
.o2{width:400px;height:400px;background:radial-gradient(circle,rgba(77,110,245,.25),transparent 70%);bottom:-100px;right:-100px;animation:fl 7s ease-in-out infinite 2s}
.o3{width:280px;height:280px;background:radial-gradient(circle,rgba(139,92,246,.2),transparent 70%);top:40%;left:55%;animation:fl 11s ease-in-out infinite 4s}
@keyframes fl{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-25px) scale(1.04)}}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}

/* CARD */
.card{position:relative;z-index:10;width:100%;max-width:410px;margin:16px;background:rgba(10,12,26,.9);border:1px solid #222640;border-radius:20px;padding:36px 32px;backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.05)}

/* LOGO */
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:26px}
.logo-icon{width:42px;height:42px;background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.logo-text b{color:#e8a020}

/* TABS */
.tabs{display:flex;background:#0e1020;border-radius:8px;padding:3px;margin-bottom:26px;gap:2px}
.tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;color:#8890b0;transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.tab.on{background:#131628;color:#eef0f8;box-shadow:0 1px 4px rgba(0,0,0,.5)}

/* FORM */
.fg{margin-bottom:15px}
.fg label{display:block;font-size:11px;color:#8890b0;margin-bottom:6px;font-weight:500}
.fg input,.fg select{width:100%;background:#0e1020;border:1px solid #222640;color:#eef0f8;border-radius:8px;padding:11px 13px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:rgba(232,160,32,.55)}
.fg input::placeholder{color:#52566e}

/* PLAN GRID */
.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:4px 0 15px}
.pl{background:#0e1020;border:1px solid #222640;border-radius:8px;padding:11px 8px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.pl:hover{border-color:#2e3358}
.pl.on{border-color:rgba(232,160,32,.5);background:rgba(232,160,32,.07)}
.pl-ck{position:absolute;top:-5px;right:-5px;width:15px;height:15px;border-radius:50%;background:#e8a020;display:none;align-items:center;justify-content:center;font-size:8px;color:#08060a;font-weight:700}
.pl.on .pl-ck{display:flex}
.pl-name{font-size:12px;font-weight:600;color:#eef0f8;margin-bottom:2px}
.pl-price{font-size:15px;font-weight:700;color:#e8a020;font-family:'Syne',sans-serif}
.pl-ch{font-size:9px;color:#52566e;margin-top:2px}
.pl.free .pl-price{color:#22c55e}

/* HINT DE PLAN */
.plan-hint{font-size:11px;color:#8890b0;background:#0e1020;border:1px solid #1a1e35;border-radius:6px;padding:8px 12px;margin-bottom:14px;line-height:1.6;display:none}

/* BTN SUBMIT */
.submit{width:100%;background:#e8a020;color:#08060a;font-size:15px;font-weight:700;padding:13px;border-radius:9px;border:none;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;margin-top:4px}
.submit:hover{background:#f5c842;transform:translateY(-1px)}
.submit:active{transform:none}
.submit:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* MENSAJES */
.msg{border-radius:7px;padding:10px 13px;font-size:12px;margin-bottom:14px;line-height:1.5;display:none}
.msg.err{background:rgba(224,56,56,.1);border:1px solid rgba(224,56,56,.3);color:#e03838}
.msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.msg.show{display:block}

/* FOOT */
.foot{margin-top:18px;text-align:center;font-size:12px;color:#52566e}
.foot a{color:#8890b0;transition:color .15s}
.foot a:hover{color:#eef0f8}

/* DEMO HINT */
.demo-hint{background:rgba(77,110,245,.08);border:1px solid rgba(77,110,245,.2);border-radius:7px;padding:10px 13px;font-size:11px;color:#8890b0;margin-bottom:16px;line-height:1.6}
.demo-hint b{color:#4d6ef5}
</style>
</head>
<body>
<div class="bg">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>
<div class="grid"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🎆</div>
    <div class="logo-text">PyroShow <b>Pro</b></div>
  </div>

  <div class="tabs">
    <button class="tab on" id="t-login"    onclick="tab('login')">Iniciar sesión</button>
    <button class="tab"    id="t-register" onclick="tab('register')">Crear cuenta</button>
  </div>

  <!-- LOGIN -->
  <div id="f-login">
    <div class="demo-hint">
      <b>Demo:</b> admin@pyroshow.com / admin123 &nbsp;|&nbsp; demo@demo.com / demo123
    </div>
    <div class="msg" id="err-login"></div>
    <div class="fg">
      <label>Correo electrónico</label>
      <input type="email" id="l-email" placeholder="correo@empresa.com" autocomplete="email"/>
    </div>
    <div class="fg">
      <label>Contraseña</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="submit" id="btn-login" onclick="login()">🔑 Entrar a PyroShow Pro</button>
    <div class="foot" style="margin-top:12px">
      <a href="#" onclick="alert('Escríbenos: hola@pyroshowpro.com');return false">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <!-- REGISTRO -->
  <div id="f-register" style="display:none">
    <div class="msg" id="err-reg"></div>
    <div class="msg" id="ok-reg"></div>
    <div class="fg">
      <label>Nombre completo</label>
      <input type="text" id="r-nombre" placeholder="Tu nombre"/>
    </div>
    <div class="fg">
      <label>Correo electrónico</label>
      <input type="email" id="r-email" placeholder="correo@empresa.com"/>
    </div>
    <div class="fg">
      <label>Contraseña (mínimo 8 caracteres)</label>
      <input type="password" id="r-pass" placeholder="••••••••"/>
    </div>
    <div class="fg">
      <label>Selecciona tu plan</label>
      <div class="plans">
        <div class="pl free on" id="pl-free" onclick="selPlan('free')">
          <div class="pl-ck">✓</div>
          <div class="pl-name">Gratis</div>
          <div class="pl-price">$0</div>
          <div class="pl-ch">1 canal</div>
        </div>
        <div class="pl" id="pl-hobby" onclick="selPlan('hobby')">
          <div class="pl-ck">✓</div>
          <div class="pl-name">Hobbyist</div>
          <div class="pl-price">$49</div>
          <div class="pl-ch">10 canales</div>
        </div>
        <div class="pl" id="pl-pro" onclick="selPlan('pro')">
          <div class="pl-ck">✓</div>
          <div class="pl-name">Pro</div>
          <div class="pl-price">$149</div>
          <div class="pl-ch">Ilimitado</div>
        </div>
      </div>
      <div class="plan-hint" id="plan-hint"></div>
    </div>
    <button class="submit" id="btn-reg" onclick="register()">🚀 Crear cuenta gratis</button>
  </div>

  <div class="foot">
    Al continuar aceptas los <a href="#">Términos de uso</a>
  </div>
</div>

<script>
// ── DATOS BASE ──────────────────────────────────────────────────────
var PLANES = {
  free:       {nombre:'Gratis',    canales:1},
  hobby:      {nombre:'Hobbyist',  canales:10},
  pro:        {nombre:'Pro',       canales:9999},
  enterprise: {nombre:'Enterprise',canales:9999},
};

var HINTS = {
  free:  '✓ 1 canal de disparo · Simulación 3D · Timeline musical · Gratis para siempre',
  hobby: '✓ Hasta 10 canales · Exportación CSV · Control ESP32 WiFi · Pago único $49',
  pro:   '✓ Canales ilimitados · Código fuente · Voice cues · Soporte prioritario · $149',
};

// Crear cuentas demo si no existen
(function(){
  var u = {};
  try{ u = JSON.parse(localStorage.getItem('pyro_users') || '{}'); }catch(e){}
  if(!u['admin@pyroshow.com']){
    u['admin@pyroshow.com'] = {nombre:'Administrador', pass:'admin123', plan:'pro', role:'admin', activo:true, creado:new Date().toISOString()};
  }
  if(!u['demo@demo.com']){
    u['demo@demo.com'] = {nombre:'Usuario Demo', pass:'demo123', plan:'free', role:'user', activo:true, creado:new Date().toISOString()};
  }
  localStorage.setItem('pyro_users', JSON.stringify(u));
})();

// Si ya hay sesión activa, ir directo a la app
(function(){
  try{
    var s = JSON.parse(sessionStorage.getItem('pyro_session') || 'null');
    if(s && s.email){ window.location.replace('app.html'); }
  }catch(e){}
})();

// ── TABS ──────────────────────────────────────────────────────
function tab(t){
  document.getElementById('f-login').style.display    = t==='login'    ? 'block' : 'none';
  document.getElementById('f-register').style.display = t==='register' ? 'block' : 'none';
  document.getElementById('t-login').classList.toggle('on',    t==='login');
  document.getElementById('t-register').classList.toggle('on', t==='register');
  limpiarMsgs();
}

// ── PLAN ─────────────────────────────────────────────────────
var planSel = 'free';
function selPlan(p){
  planSel = p;
  ['free','hobby','pro'].forEach(function(id){
    document.getElementById('pl-'+id).classList.toggle('on', id===p);
  });
  var h = document.getElementById('plan-hint');
  h.textContent = HINTS[p] || '';
  h.style.display = 'block';
  document.getElementById('btn-reg').textContent = p==='free' ? '🚀 Crear cuenta gratis' : '🚀 Crear cuenta — '+PLANES[p].nombre;
}

// ── LOGIN ─────────────────────────────────────────────────────
function login(){
  var email = (document.getElementById('l-email').value || '').trim().toLowerCase();
  var pass  = document.getElementById('l-pass').value || '';
  var btn   = document.getElementById('btn-login');
  limpiarMsgs();

  if(!email){ mostrarMsg('err-login','Escribe tu correo electrónico'); return; }
  if(!pass){  mostrarMsg('err-login','Escribe tu contraseña'); return; }

  btn.disabled = true;
  btn.textContent = 'Verificando...';

  setTimeout(function(){
    var users = {};
    try{ users = JSON.parse(localStorage.getItem('pyro_users') || '{}'); }catch(e){}

    var u = users[email];

    if(!u){
      mostrarMsg('err-login','No existe ninguna cuenta con ese correo. ¿Quieres crear una?');
      btn.disabled = false; btn.textContent = '🔑 Entrar a PyroShow Pro';
      return;
    }
    if(u.pass !== pass){
      mostrarMsg('err-login','Contraseña incorrecta. Inténtalo de nuevo.');
      btn.disabled = false; btn.textContent = '🔑 Entrar a PyroShow Pro';
      return;
    }
    if(u.activo === false){
      mostrarMsg('err-login','Esta cuenta está desactivada. Contacta al administrador.');
      btn.disabled = false; btn.textContent = '🔑 Entrar a PyroShow Pro';
      return;
    }

    // Éxito — guardar sesión
    var sesion = {email:email, nombre:u.nombre, plan:u.plan||'free', role:u.role||'user'};
    sessionStorage.setItem('pyro_session', JSON.stringify(sesion));

    btn.textContent = '✓ Bienvenido, ' + u.nombre.split(' ')[0] + '!';
    btn.style.background = '#22c55e';
    btn.style.color = '#fff';

    setTimeout(function(){ window.location.replace('app.html'); }, 600);

  }, 500);
}

// ── REGISTRO ─────────────────────────────────────────────────
function register(){
  var nombre = (document.getElementById('r-nombre').value || '').trim();
  var email  = (document.getElementById('r-email').value  || '').trim().toLowerCase();
  var pass   = document.getElementById('r-pass').value || '';
  var btn    = document.getElementById('btn-reg');
  limpiarMsgs();

  if(!nombre){ mostrarMsg('err-reg','Escribe tu nombre'); return; }
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ mostrarMsg('err-reg','Escribe un correo válido'); return; }
  if(pass.length < 8){ mostrarMsg('err-reg','La contraseña debe tener al menos 8 caracteres'); return; }

  var users = {};
  try{ users = JSON.parse(localStorage.getItem('pyro_users') || '{}'); }catch(e){}

  if(users[email]){ mostrarMsg('err-reg','Ya existe una cuenta con ese correo. Inicia sesión.'); return; }

  btn.disabled = true; btn.textContent = 'Creando cuenta...';

  setTimeout(function(){
    users[email] = {nombre:nombre, pass:pass, plan:planSel, role:'user', activo:true, creado:new Date().toISOString()};
    localStorage.setItem('pyro_users', JSON.stringify(users));

    var sesion = {email:email, nombre:nombre, plan:planSel, role:'user'};
    sessionStorage.setItem('pyro_session', JSON.stringify(sesion));

    if(planSel === 'free'){
      btn.textContent = '✓ Cuenta creada';
      btn.style.background = '#22c55e';
      setTimeout(function(){ window.location.replace('app.html'); }, 700);
    } else {
      btn.disabled = false; btn.textContent = '🚀 Crear cuenta — ' + PLANES[planSel].nombre;
      mostrarMsg('ok-reg',
        '✓ Cuenta creada. Para activar el plan ' + PLANES[planSel].nombre +
        ', completa el pago en la sección de precios.');
    }
  }, 600);
}

// ── HELPERS ───────────────────────────────────────────────────
function mostrarMsg(id, txt, tipo){
  var el = document.getElementById(id);
  if(!el) return;
  el.textContent = txt;
  el.className = 'msg ' + (tipo||'err') + ' show';
}

function limpiarMsgs(){
  ['err-login','err-reg','ok-reg'].forEach(function(id){
    var el = document.getElementById(id);
    if(el){ el.className = 'msg'; el.textContent = ''; }
  });
}
</script>
</body>
</html>
